<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu HTML</title>
  <style>
    /* Selecionar tudo */
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url(https://assets.nflxext.com/ffe/siteui/vlv3/75772f65-58b5-465f-b642-fa858b6168ca/web/BR-pt-20260302-TRIFECTA-perspective_9be8c6af-4924-4ec6-a4ff-d7c463e500d6_large.jpg);
      background-size: cover;
      background-position: top-center;
    }

    #heading {
      background: rgba(0, 0, 0, 0.7);
    }

    #heading div {
      width: 90%;
      display: flex;
      justify-content: space-between;
      margin: 0 auto;
    }

    #heading .h1 {
      padding: 15px 0;
      font-size: 24px;
      text-transform: uppercase;
    }

    #heading a {
      color: #fff;
      /* sublinhado */
      text-decoration: none;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <header id="heading">
    <div>
      
      <h1 class="h1">
        <a href="#">Netflix</a>
      </h1>

      <h1 class="h1">
        <a href="#">Netflix</a>
      </h1>

    </div>
  </header>
</body>
</html>
